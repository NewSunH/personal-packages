name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix flake check --show-trace
      - name: Build Apple Color Emoji without a public binary cache
        run: nix build --no-link .#apple-emoji-ttf
