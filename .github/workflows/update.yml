name: Update packages

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: package-updates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      UPDATE_BRANCH: automation/package-updates

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update package metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/update

      - name: Check flake
        run: nix flake check --show-trace

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Apple Color Emoji without a public binary cache
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: nix build --no-link .#apple-emoji-ttf

      - uses: cachix/cachix-action@v17
        with:
          name: newsunh
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build cacheable packages
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build --no-link \
            .#naiveproxy-bin \
            .#ariang \
            .#rime-wanxiang-schema \
            .#rime-wanxiang-gram

      - name: Commit update branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --create "$UPDATE_BRANCH"
          git add flake.lock packages/*/source.json
          git commit --message "chore: update package sources"
          git push --force origin "HEAD:refs/heads/$UPDATE_BRANCH"

      - name: Open update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr view "$UPDATE_BRANCH" >/dev/null 2>&1; then
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "chore: update package sources" \
              --body "Automated package source and flake input updates."
          fi
